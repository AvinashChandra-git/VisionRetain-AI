## nginx.conf — VisionRetain AI Production Config
## Handles: SSL termination, reverse proxy, rate limiting, WebSocket upgrade

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'" always;
    server_tokens off;

    # ── Rate Limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=scan_limit:10m rate=30r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream Backends ─────────────────────────────────────────────────────
    upstream spring_api {
        server api:8080 weight=1 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ml_service {
        server ml:8001 weight=1 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream frontend {
        server frontend:3000 weight=1;
    }

    # ── HTTP → HTTPS Redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name app.visionretain.ai api.visionretain.ai;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS Server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name app.visionretain.ai;

        ssl_certificate     /etc/ssl/certs/visionretain.crt;
        ssl_certificate_key /etc/ssl/private/visionretain.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        root /usr/share/nginx/html;
        index index.html;

        client_max_body_size 25M;  # for product image uploads
        limit_conn conn_limit 20;

        # ── Frontend SPA ──────────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            # SPA fallback
            try_files $uri $uri/ /index.html;
        }

        # ── Static Assets (aggressive caching) ───────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
            proxy_pass http://frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ── API Gateway ───────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.visionretain.ai;

        ssl_certificate     /etc/ssl/certs/visionretain.crt;
        ssl_certificate_key /etc/ssl/private/visionretain.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 25M;

        # ── Auth endpoints (strict rate limiting) ─────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://spring_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Product Lens (image upload, slower timeout) ───────────────────────
        location /api/v1/product-lens/scan {
            limit_req zone=scan_limit burst=10 nodelay;

            proxy_pass http://spring_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;  # AI recognition can take time
            proxy_send_timeout 60s;
        }

        # ── ML Service (internal only) ────────────────────────────────────────
        location /api/v1/ml/ {
            limit_req zone=api_limit burst=20 nodelay;

            # Strip /api/v1/ml prefix
            rewrite ^/api/v1/ml/(.*) /$1 break;
            proxy_pass http://ml_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 45s;
        }

        # ── All other API calls ───────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_req_status 429;

            proxy_pass http://spring_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # ── WebSocket (real-time notifications + dashboard) ───────────────────
        location /ws/ {
            proxy_pass http://spring_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;  # Keep WebSocket alive 1hr
            proxy_send_timeout 3600s;
        }

        # ── Health check (no auth, no rate limit) ─────────────────────────────
        location /health {
            proxy_pass http://spring_api/actuator/health;
            access_log off;
        }

        # ── Swagger / OpenAPI docs ─────────────────────────────────────────────
        location /swagger-ui/ {
            proxy_pass http://spring_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── Block common attack paths ─────────────────────────────────────────
        location ~* \.(env|git|sql|log|conf|bak)$ {
            deny all;
            return 404;
        }

        location ~ /\. {
            deny all;
        }
    }
}
